interview:
  questions_asked:
    - question: "Which tracker is the source of truth for backlog and delivery: GitHub Issues, Jira, Linear, or local markdown?"
      answer: "GitHub Issues"
      date: 2026-04-23
    - question: "Do you use the gh CLI for PR operations, or GitHub MCP?"
      answer: "gh CLI"
      date: 2026-04-23
    - question: "Who merges PRs and what review requirements are mandatory before merge?"
      answer: "CODEOWNERS review is required before merge"
      date: 2026-04-23
    - question: "Do you use estimation (story points/t-shirt sizing)?"
      answer: "No estimation"
      date: 2026-04-23
    - question: "Do tickets frequently lack enough context, and do you want a Definition of Ready checklist in pm-instructions?"
      answer: "Yes"
      date: 2026-04-23
    - question: "Any required quality gates beyond current tests (e.g., lint, formatting, release checks)?"
      answer: "No additional quality gates"
      date: 2026-04-23
    - question: "What labels should map GitHub workflow states (todo/in-progress/review/blocked/done)?"
      answer: "Use standard ADOS labels: change, in-progress, review, blocked, delivered"
      date: 2026-04-23
    - question: "I could not find a CODEOWNERS file in this repo; is review enforcement configured via branch protection/org rules, or should bootstrap add TODO guidance?"
      answer: "Review/merge handled by human repository owner; no formal CODEOWNERS document exists"
      date: 2026-04-23
    - question: "What branch naming convention should be used in PM instructions?"
      answer: "conventional feature|fix|refactor|chore|docs/GH-<id>-<slug>"
      date: 2026-04-23
    - question: "Where should documentation-handbook.md be copied from in your ADOS installation (source path), or should I draft a minimal project-local handbook instead?"
      answer: "Use fallback minimal handbook"
      date: 2026-04-23
  pending_questions:
    []

